name: ConnectHub CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: connecthub_user
          POSTGRES_PASSWORD: connecthub_password
          POSTGRES_DB: connecthub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci || npm install
      
    - name: Run Backend Tests
      working-directory: ./backend
      run: npm test
      env:
        NODE_ENV: test
        DB_USER: connecthub_user
        DB_PASSWORD: connecthub_password
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: connecthub
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: testing_secretkey123
        TURN_URL: turn:localhost:3478
        TURN_SECRET: testing_turnsecret123

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci || npm install
      
    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npm test
