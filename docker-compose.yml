services:
  db:
    image: postgres:15-alpine
    container_name: connecthub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-connecthub}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d connecthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: connecthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:4.6
    container_name: connecthub-coturn
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    command: >
      -n --log-file=stdout --min-port=49152 --max-port=65535
      --realm=connecthub --use-auth-secret --static-auth-secret=${TURN_SECRET:?Set TURN_SECRET in .env}

  backend:
    build:
      context: ./backend
    container_name: connecthub-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-connecthub}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - REDIS_URL=redis://redis:6379
      - TURN_URL=turn:coturn:3478
      - TURN_SECRET=${TURN_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: connecthub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend

volumes:
  pgdata:
